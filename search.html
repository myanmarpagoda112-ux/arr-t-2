<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurmaRHubb.COM - Search & Filter</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#0f3460 50%,#16213e 100%);min-height:100vh;color:#e0e0e0}header{background:linear-gradient(135deg,#1a1a2e 0%,#0f3460 100%);padding:20px 0;border-bottom:2px solid #e74c3c;position:sticky;top:0;z-index:100}.header-container{max-width:1400px;margin:0 auto;padding:0 20px;display:flex;justify-content:space-between;align-items:center}.logo{font-size:26px;font-weight:900;background:linear-gradient(135deg,#e74c3c 0%,#f39c12 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.nav-links a{color:#ecf0f1;text-decoration:none;margin-left:20px;font-weight:600;transition:color 0.3s ease}.nav-links a:hover{color:#e74c3c}.container{max-width:1400px;margin:0 auto;padding:40px 20px}.search-section{background:#1a1a2e;border:2px solid #2c3e50;border-radius:10px;padding:30px;margin-bottom:40px}.search-box{display:flex;gap:10px;margin-bottom:20px}.search-box input{flex:1;padding:12px 15px;border:2px solid #2c3e50;border-radius:8px;background:#0f1419;color:#ecf0f1;font-size:14px}.search-box input:focus{outline:none;border-color:#e74c3c}.search-box button{background:#e74c3c;color:white;border:none;padding:12px 25px;border-radius:8px;font-weight:600;cursor:pointer;transition:all 0.3s ease}.search-box button:hover{background:#c0392b}.filters{display:flex;gap:15px;flex-wrap:wrap}.filter-chip{padding:10px 15px;background:#2c3e50;border:2px solid #34495e;border-radius:20px;cursor:pointer;transition:all 0.3s ease;color:#ecf0f1;font-size:13px}.filter-chip.active{background:#e74c3c;border-color:#e74c3c}.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:25px}.result-card{background:#1a1a2e;border:2px solid #2c3e50;border-radius:10px;overflow:hidden;cursor:pointer;transition:all 0.3s ease}.result-card:hover{border-color:#e74c3c;transform:translateY(-5px)}.result-image{width:100%;height:280px;object-fit:cover;background:linear-gradient(135deg,#0f3460 0%,#16213e 100%)}.result-info{padding:15px}.result-title{font-weight:700;color:#e74c3c;margin-bottom:8px;font-size:14px}.result-category{font-size:12px;color:#95a5a6;background:#2c3e50;padding:4px 8px;border-radius:4px;display:inline-block}
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">BurmaRHubb.COM</div>
            <div class="nav-links"><a href="/arr-t-2/">Home</a><a href="/arr-t-2/login.html">Login</a></div>
        </div>
    </header>
    <div class="container">
        <div class="search-section">
            <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Search content..." onkeyup="performSearch()"><button onclick="performSearch()">Search</button></div>
            <div class="filters" id="categoryFilters"></div>
        </div>
        <div class="results-grid" id="resultsGrid"><p style="color:#95a5a6;text-align:center;grid-column:1/-1;">Enter search term...</p></div>
    </div>
    <script>let allContent=[];let selectedCategory=null;async function loadContent(){try{const response=await fetch('https://api.github.com/repos/myanmarpagoda112-ux/arr-t-2/contents/books.json');const data=await response.json();const decodedContent=decodeURIComponent(escape(atob(data.content)));allContent=JSON.parse(decodedContent);loadCategories()}catch(error){console.error('Error:',error)}}function loadCategories(){const categories=[{id:1,name:'Manga',icon:'📚'},{id:2,name:'Novels',icon:'📖'},{id:3,name:'Stories',icon:'✍️'},{id:4,name:'Comics',icon:'🎨'},{id:5,name:'Articles',icon:'📰'}];const filterContainer=document.getElementById('categoryFilters');categories.forEach(cat=>{const chip=document.createElement('div');chip.className='filter-chip';chip.innerText=`${cat.icon} ${cat.name}`;chip.onclick=()=>toggleCategory(chip,cat.id);filterContainer.appendChild(chip)})}function toggleCategory(chip,catId){document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));chip.classList.add('active');selectedCategory=catId;performSearch()}function performSearch(){const query=document.getElementById('searchInput').value.toLowerCase();let results=allContent;if(query){results=results.filter(item=>item.title.toLowerCase().includes(query)||item.description.toLowerCase().includes(query))}displayResults(results)}function displayResults(results){const grid=document.getElementById('resultsGrid');grid.innerHTML='';if(results.length===0){grid.innerHTML='<p style="color:#95a5a6;text-align:center;grid-column:1/-1;">No results</p>';return}results.forEach(item=>{const card=document.createElement('div');card.className='result-card';card.innerHTML=`<img src="${item.image}" alt="${item.title}" class="result-image"><div class="result-info"><div class="result-title">${item.title}</div><span class="result-category">📚 Manga</span></div>`;grid.appendChild(card)})}loadContent()
    </script>
</body>
</html>
