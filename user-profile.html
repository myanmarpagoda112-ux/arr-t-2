<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurmaRHubb.COM - My Profile</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#0f3460 50%,#16213e 100%);min-height:100vh;color:#e0e0e0}header{background:linear-gradient(135deg,#1a1a2e 0%,#0f3460 100%);padding:20px 0;border-bottom:2px solid #e74c3c}.header-container{max-width:1400px;margin:0 auto;padding:0 20px;display:flex;justify-content:space-between;align-items:center}.logo{font-size:26px;font-weight:900;background:linear-gradient(135deg,#e74c3c 0%,#f39c12 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.user-menu{display:flex;gap:15px;align-items:center}.btn-logout{background:#e74c3c;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-weight:600;transition:all 0.3s ease}.btn-logout:hover{background:#c0392b}.container{max-width:1200px;margin:0 auto;padding:40px 20px}.profile-card{background:#1a1a2e;border:2px solid #2c3e50;border-radius:10px;padding:30px;margin-bottom:30px}.profile-header{display:flex;align-items:center;gap:30px;margin-bottom:30px}.avatar{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,#e74c3c 0%,#f39c12 100%);display:flex;align-items:center;justify-content:center;font-size:50px}.profile-info h2{font-size:28px;margin-bottom:10px;color:#e74c3c}.profile-info p{color:#95a5a6;font-size:14px;margin-bottom:5px}.section-title{font-size:24px;margin-top:40px;margin-bottom:20px;color:#e74c3c;padding-bottom:10px;border-bottom:2px solid #2c3e50}
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">BurmaRHubb.COM</div>
            <div class="user-menu"><span id="currentUser"></span><button class="btn-logout" onclick="logout()">Logout</button></div>
        </div>
    </header>
    <div class="container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar">👤</div>
                <div class="profile-info"><h2 id="username"></h2><p><strong>Email:</strong> <span id="email"></span></p><p><strong>Member Since:</strong> <span id="joinDate"></span></p></div>
            </div>
        </div>
        <div class="section-title">📚 Your Favorites</div>
    </div>
    <script>function loadProfile(){const currentUser=JSON.parse(localStorage.getItem('currentUser'));if(!currentUser){window.location.href='/arr-t-2/login.html';return}document.getElementById('username').innerText=currentUser.username;document.getElementById('email').innerText=currentUser.email;document.getElementById('currentUser').innerText='👤 '+currentUser.username;document.getElementById('joinDate').innerText=new Date(currentUser.createdAt).toLocaleDateString()}function logout(){localStorage.removeItem('currentUser');window.location.href='/arr-t-2/'}loadProfile()
    </script>
</body>
</html>
