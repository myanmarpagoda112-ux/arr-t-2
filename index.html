<script>
    // ⚠️ သင့် GitHub ရဲ့ books.json RAW Link ကို ထည့်သွင်းထားပြီးဖြစ်သည်
    const github_raw_url = "https://raw.githubusercontent.com/myanmarpagoda112-ux/arr-t-2/refs/heads/main/books.json"; 

    let searchKeyword = "asian"; 
    let dashboardPageNum = Math.floor(Math.random() * 5) + 1; 
    let playerRelatedPageNum = Math.floor(Math.random() * 5) + 6;
    let isFetchingMore = false;
    let currentActiveView = "dashboard"; 

    if (!sessionStorage.getItem('seenVideoIds')) sessionStorage.setItem('seenVideoIds', JSON.stringify([]));
    if (!localStorage.getItem('userFavoriteVideos')) localStorage.setItem('userFavoriteVideos', JSON.stringify([]));
    if (!localStorage.getItem('userFavoriteBooks')) localStorage.setItem('userFavoriteBooks', JSON.stringify([]));

    document.addEventListener("DOMContentLoaded", () => {
        loadPortalVideos(searchKeyword, dashboardPageNum, 'mainVideoGrid', false);
        renderBooksDirectory();

        document.addEventListener('click', () => {
            document.getElementById('headerDropdownMenu').style.display = 'none';
        });
    }); 

    function toggleHeaderMenu(e) {
        e.stopPropagation();
        const menu = document.getElementById('headerDropdownMenu');
        menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
    }

    // 🎬 ROUTE ANIMATED TRANSACTION FADE IN/OUT + WHITE/BLACK UI THEME SWITCH
    function switchRouteView(target) {
        const bodyEl = document.body;
        const currentActivePage = document.querySelector('.page.active');
        
        if (currentActivePage) currentActivePage.style.opacity = '0';

        setTimeout(() => {
            document.getElementById('dashboardPage').classList.remove('active');
            document.getElementById('novelAppPage').classList.remove('active');
            document.getElementById('playerPage').classList.remove('active');
            document.getElementById('novelReaderPage').classList.remove('active');

            if (target === 'novel') {
                bodyEl.classList.add('novel-mode-active');
                const targetPage = document.getElementById('novelAppPage');
                targetPage.classList.add('active');
                setTimeout(() => targetPage.style.opacity = '1', 50);
                renderBooksDirectory(); // Fetch JSON again on load
            } else {
                bodyEl.classList.remove('novel-mode-active');
                const targetPage = document.getElementById('dashboardPage');
                targetPage.classList.add('active');
                setTimeout(() => targetPage.style.opacity = '1', 50);
            }
        }, 400);
    }

    // GITHUB JSON မှ စာအုပ်များ ဆွဲယူပြသပေးမည့် Function (ပြင်ဆင်ပြီးသား)
    async function renderBooksDirectory() {
        const grid = document.getElementById('booksDirectoryGrid');
        grid.innerHTML = `<div class="system-msg">စာအုပ်များ ဆွဲနေသည်...</div>`;
        
        try {
            // GitHub Repository Cached ဖြစ်မနေစေရန် Timestamp parameters ထည့်သွင်းထားပါသည်
            const res = await fetch(`${github_raw_url}?t=${new Date().getTime()}`);
            const booksData = await res.json();
            
            grid.innerHTML = "";
            let favBooks = JSON.parse(localStorage.getItem('userFavoriteBooks')) || [];

            if (!booksData || booksData.length === 0) {
                grid.innerHTML = `<div class="system-msg">စာအုပ်များ မရှိသေးပါ။</div>`;
                return;
            }

            booksData.forEach(book => {
                const isBookFav = favBooks.includes(book.id);
                const card = document.createElement('div');
                card.className = 'book-profile-card';
                
                // 💡 Line Breaks ကြောင့် JS Error မတက်စေရန် data-attributes တွင် encode လုပ်၍ လုံခြုံစွာ သိမ်းဆည်းခြင်း
                card.setAttribute('data-title', book.title);
                card.setAttribute('data-content', encodeURIComponent(book.content || ""));
                
                card.onclick = function() {
                    const title = this.getAttribute('data-title');
                    const rawContent = decodeURIComponent(this.getAttribute('data-content'));
                    launchBookReader(title, rawContent);
                };

                card.innerHTML = `
                    <div class="book-fav-trigger ${isBookFav ? 'is-book-fav' : ''}" onclick="toggleBookFavorite(event, '${book.id}')">
                        ${isBookFav ? '❤️' : '♡'}
                    </div>
                    <div class="book-cover-wrap">
                        <img src="${book.image_url}" alt="Cover">
                    </div>
                    <div class="book-info-area">
                        <div class="book-title-text">${book.title}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        } catch (err) {
            console.error(err);
            grid.innerHTML = `<div class="system-msg">စာအုပ်များ ဆွဲယူ၍ မရနိုင်ပါ။ (JSON file လွတ်နေခြင်း သို့မဟုတ် Token မမှန်ခြင်း ဖြစ်နိုင်သည်)</div>`;
        }
    }

    function toggleBookFavorite(e, bookId) {
        e.stopPropagation();
        let favBooks = JSON.parse(localStorage.getItem('userFavoriteBooks')) || [];
        const idx = favBooks.indexOf(bookId);

        if (idx > -1) {
            favBooks.splice(idx, 1);
            e.target.innerHTML = '♡';
            e.target.classList.remove('is-book-fav');
        } else {
            favBooks.push(bookId);
            e.target.innerHTML = '❤️';
            e.target.classList.add('is-book-fav');
        }
        localStorage.setItem('userFavoriteBooks', JSON.stringify(favBooks));
    }

    function launchBookReader(title, content) {
        const currentActivePage = document.querySelector('.page.active');
        if (currentActivePage) currentActivePage.style.opacity = '0';

        setTimeout(() => {
            document.getElementById('novelAppPage').classList.remove('active');
            document.getElementById('novelReaderPage').classList.add('active');
            
            document.getElementById('readerTitleDisplay').innerText = title;
            document.getElementById('readerBodyDisplay').innerText = content;
            
            const targetPage = document.getElementById('novelReaderPage');
            setTimeout(() => targetPage.style.opacity = '1', 50);
            window.scrollTo(0, 0);
        }, 400);
    }

    function exitReaderToDirectory() {
        const currentActivePage = document.querySelector('.page.active');
        if (currentActivePage) currentActivePage.style.opacity = '0';

        setTimeout(() => {
            document.getElementById('novelReaderPage').classList.remove('active');
            document.getElementById('novelAppPage').classList.add('active');
            
            const targetPage = document.getElementById('novelAppPage');
            setTimeout(() => targetPage.style.opacity = '1', 50);
        }, 400);
    }

    function closeNoticePopup() { document.getElementById('noticePopup').style.display = 'none'; } 
    
    function executeSearch() {
        const value = document.getElementById('searchField').value.trim();
        searchKeyword = value ? value : "asian"; 
        dashboardPageNum = Math.floor(Math.random() * 5) + 1;
        loadPortalVideos(searchKeyword, dashboardPageNum, 'mainVideoGrid', false);
    } 

    function changeCategory(type, element) {
        document.querySelectorAll('.tag-pill').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
        searchKeyword = (type === 'all') ? 'asian' : type;
        dashboardPageNum = Math.floor(Math.random() * 5) + 1;
        loadPortalVideos(searchKeyword, dashboardPageNum, 'mainVideoGrid', false);
    }

    function handleFavCategoryClick(element) {
        document.querySelectorAll('.tag-pill').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
        const adPopup = document.getElementById('adPopup');
        const adFrame = document.getElementById('adSmartlinkFrame');
        const timerText = document.getElementById('adTimerText');
        adFrame.src = "https://www.effectivecpmnetwork.com/y8j5fhj7?key=f358a7cf2521836b21c157f8969ed338";
        adPopup.style.display = 'flex';
        let timeLeft = 10;
        timerText.innerText = `Please wait ${timeLeft}s to view Favorites...`;
        const countdown = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                adPopup.style.display = 'none';
                adFrame.src = ""; 
                displayFavoriteVideos();
            } else { timerText.innerText = `Please wait ${timeLeft}s to view Favorites...`; }
        }, 1000);
    }

    function displayFavoriteVideos() {
        searchKeyword = "___favorites___";
        const targetGrid = document.getElementById('mainVideoGrid');
        targetGrid.innerHTML = "";
        let favorites = JSON.parse(localStorage.getItem('userFavoriteVideos'));
        if (favorites.length === 0) {
            targetGrid.innerHTML = `<div class="system-msg">အကြိုက်ဆုံးအဖြစ် သိမ်းဆည်းထားသော ဗီဒီယိုများ မရှိသေးပါ။</div>`;
            return;
        }
        favorites.forEach(video => {
            const card = document.createElement('div');
            card.className = 'clean-video-card';
            card.onclick = () => openVideoPlayer(video.embed, video.title); 
            card.innerHTML = `
                <div class="thumb-wrapper">
                    <img src="${video.thumb}" alt="Thumb"><div class="video-duration-badge">${video.duration}</div>
                    <div class="favorite-btn-action is-fav" onclick="toggleFavorite(event, ${JSON.stringify(video).replace(/"/g, '&quot;')})">❤️</div>
                </div>
                <div class="meta-description-area">
                    <div class="meta-title">${video.title}</div>
                    <div class="meta-stats"><span class="stat-views">${video.views} views</span><span>Recent</span></div>
                </div>`;
            targetGrid.appendChild(card);
        });
    }

    async function loadPortalVideos(query, pageNum, containerId, appendMode = false) {
        if (query === "___favorites___") return;
        const targetGrid = document.getElementById(containerId);
        if (!appendMode) { targetGrid.innerHTML = `<div class="system-msg" id="gridLoader">Loading videos...</div>`; } 
        else {
            const scrollLoader = document.createElement('div');
            scrollLoader.className = 'system-msg'; scrollLoader.id = 'infiniteScrollLoader'; scrollLoader.innerText = 'Loading more videos...';
            targetGrid.appendChild(scrollLoader);
        } 
        try {
            const endpoint = `https://www.eporner.com/api/v2/video/search/?query=${encodeURIComponent(query)}&per_page=20&page=${pageNum}&thumbsize=big`;
            const res = await fetch(endpoint); const resultData = await res.json(); 
            if (!appendMode) { targetGrid.innerHTML = ""; } else { const existingLoader = document.getElementById('infiniteScrollLoader'); if (existingLoader) existingLoader.remove(); } 
            let seenVideoIds = JSON.parse(sessionStorage.getItem('seenVideoIds')); let favorites = JSON.parse(localStorage.getItem('userFavoriteVideos'));
            if (resultData.videos && resultData.videos.length > 0) {
                resultData.videos.forEach(video => {
                    if (!seenVideoIds.includes(video.id)) {
                        seenVideoIds.push(video.id); 
                        const rawViews = video.views || Math.floor(Math.random() * 450) + 25;
                        const formattedViews = rawViews >= 1000 ? (rawViews / 1000).toFixed(1) + 'K' : rawViews; 
                        const durationStr = `${video.length_min}:${video.length_sec < 10 ? '0' + video.length_sec : video.length_sec}`;
                        const isAlreadyFav = favorites.some(item => item.id === video.id);
                        const minimalVideoData = { id: video.id, title: video.title.replace(/'/g, "\\'").replace(/"/g, '\\"'), embed: video.embed, thumb: video.default_thumb.src, duration: durationStr, views: formattedViews };
                        const card = document.createElement('div');
                        card.className = 'clean-video-card'; card.onclick = () => openVideoPlayer(video.embed, video.title); 
                        card.innerHTML = `
                            <div class="thumb-wrapper">
                                <img src="${video.default_thumb.src}" alt="Thumb"><div class="video-duration-badge">${durationStr}</div>
                                <div class="favorite-btn-action ${isAlreadyFav ? 'is-fav' : ''}" onclick="toggleFavorite(event, ${JSON.stringify(minimalVideoData).replace(/"/g, '&quot;')})">${isAlreadyFav ? '❤️' : '♡'}</div>
                            </div>
                            <div class="meta-description-area">
                                <div class="meta-title">${video.title}</div>
                                <div class="meta-stats"><span class="stat-views">${formattedViews} views</span><span>${video.added || 'Recent'}</span></div>
                            </div>`;
                        targetGrid.appendChild(card);
                    }
                }); 
                sessionStorage.setItem('seenVideoIds', JSON.stringify(seenVideoIds)); isFetchingMore = false;
            } else { isFetchingMore = false; }
        } catch (err) { console.error(err); isFetchingMore = false; }
    } 

    function toggleFavorite(e, videoData) {
        e.stopPropagation(); let favorites = JSON.parse(localStorage.getItem('userFavoriteVideos')); const index = favorites.findIndex(item => item.id === videoData.id);
        if (index > -1) { favorites.splice(index, 1); e.currentTarget.classList.remove('is-fav'); e.currentTarget.innerHTML = '♡'; } 
        else { favorites.push(videoData); e.currentTarget.classList.add('is-fav'); e.currentTarget.innerHTML = '❤️'; }
        localStorage.setItem('userFavoriteVideos', JSON.stringify(favorites));
    }

    function openVideoPlayer(embedUrl, title) {
        currentActiveView = "player"; document.getElementById('dashboardPage').classList.remove('active'); document.getElementById('playerPage').classList.add('active'); 
        document.getElementById('iframeWrapper').innerHTML = `<iframe src="${embedUrl}" allowfullscreen scrolling="no"></iframe>`;
        document.getElementById('activeVideoTitle').innerText = title; playerRelatedPageNum = Math.floor(Math.random() * 5) + 6;
        loadPortalVideos(searchKeyword, playerRelatedPageNum, 'relatedVideoGrid', false); window.scrollTo(0, 0);
    } 

    function returnToDashboard() {
        currentActiveView = "dashboard"; document.getElementById('playerPage').classList.remove('active'); document.getElementById('dashboardPage').classList.add('active');
        document.getElementById('iframeWrapper').innerHTML = ""; document.getElementById('relatedVideoGrid').innerHTML = ""; 
        if (searchKeyword === "___favorites___") { displayFavoriteVideos(); } else { loadPortalVideos(searchKeyword, dashboardPageNum, 'mainVideoGrid', false); }
    }
</script>
