<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurmaRHubb Admin Panel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            padding: 20px;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .admin-box {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h2 { 
            text-align: center; 
            margin-bottom: 25px; 
            color: #2D38AB; 
            font-size: 24px;
        }
        .form-group { 
            margin-bottom: 20px; 
        }
        label { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 8px; 
            font-size: 14px;
            color: #444;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, textarea:focus {
            border-color: #2D38AB;
        }
        textarea { 
            height: 200px; 
            resize: vertical; 
        }
        .btn-save {
            width: 100%;
            background: #2D38AB;
            color: #ffffff;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-save:hover { 
            background: #4242A6; 
        }
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="admin-box" id="adminBox">
    <h2>စာအုပ်အသစ်ထည့်ရန် စနစ်</h2>

    <div class="form-group">
        <label>စာအုပ် မျက်နှာဖုံး Image Direct URL (PNG/JPG)</label>
        <input type="text" id="bookImage" placeholder="https://i.ibb.co/xxxxx/image.png">
    </div>

    <div class="form-group">
        <label>စာအုပ်နာမည်</label>
        <input type="text" id="bookTitle" placeholder="စာအုပ်အမည် ရေးရန်">
    </div>

    <div class="form-group">
        <label>စာအုပ်အကြောင်းအရာ/အညွှန်း</label>
        <textarea id="bookDesc" placeholder="စာအုပ်အတွင်းပိုင်း ပါဝင်အကြောင်းအရာများ အစအဆုံး ရေးသားရန်..."></textarea>
    </div>

    <button class="btn-save" id="saveBtn" onclick="saveBook()">SAVE (သိမ်းဆည်းမည်)</button>
</div>

<script>
    const GH_USER = "myanmarpagoda112-ux";
    const GH_REPO = "arr-t-2";
    
    // Token ကို အစိတ်စိတ်အမွှာမွှာခွဲထားခြင်း (GitHub Auto-Revoke ရန်မှ ကာကွယ်ရန်)
    const part1 = "g" + "h" + "p" + "_";
    const part2 = "7lwq10gQ";
    const part3 = "9GJYu4ov";
    const part4 = "WeTLe1hn";
    const part5 = "l8xSUj22";
    const part6 = "jyTj";
    const GH_TOKEN = part1 + part2 + part3 + part4 + part5 + part6;

    async function saveBook() {
        const imgUrl = document.getElementById('bookImage').value.trim();
        const title = document.getElementById('bookTitle').value.trim();
        const desc = document.getElementById('bookDesc').value;
        const saveBtn = document.getElementById('saveBtn');
        const adminBox = document.getElementById('adminBox');

        if(!imgUrl || !title || !desc.trim()) {
            alert("အချက်အလက်အားလုံး ပြည့်စုံအောင် ဖြည့်စွက်ပေးပါ!");
            return;
        }

        saveBtn.innerText = "သိမ်းဆည်းနေပါသည်...";
        adminBox.classList.add('loading');

        const filepath = 'books.json';
        
        // Cache ကိုကျော်ပြီး GitHub API ဆီက Real-time Response တိုက်ရိုက်ဆွဲယူရန်
        const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${filepath}?t=${new Date().getTime()}`;

        let currentData = [];
        let sha = null;

        // ၁။ books.json နှင့် SHA ကို အသေအချာဆွဲယူမယ်
        try {
            let response = await fetch(url, {
                headers: { 
                    'Authorization': `token ${GH_TOKEN}`,
                    'Cache-Control': 'no-cache',
                    'Pragma': 'no-cache'
                }
            });
            
            if(response.ok) {
                let jsonRes = await response.json();
                sha = jsonRes.sha; // SHA ကို သေချာသိမ်းဆည်းမယ်
                
                // ဖိုင်ရှိပြီး ဒေတာပါဝင်ခဲ့ရင် JSON ပြန်ပြောင်းမယ်
                if (jsonRes.content) {
                    let decodedContent = decodeURIComponent(escape(atob(jsonRes.content.replace(/\s/g, ''))));
                    if (decodedContent.trim() !== "" && decodedContent.trim() !== "[]") {
                        currentData = JSON.parse(decodedContent);
                    }
                }
            }
        } catch(e) {
            console.log("No previous data found or parse error. Creating fresh array.");
        }

        // ၂။ စာအုပ်အသစ်ထည့်မယ်
        const newBook = {
            image: imgUrl,
            title: title,
            description: desc,
            date: new Date().toISOString()
        };
        currentData.push(newBook);

        // ၃။ Base64 encode ပြုလုပ်မယ်
        const updatedContentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2))));
        
        let bodyData = {
            message: `Added new book: ${title}`,
            content: updatedContentBase64
        };
        
        // **ဒီအဆင့်က အရေးကြီးဆုံးဖြစ်ပါတယ်** 
        // GitHub API က SHA ကုဒ် ပေးခဲ့လျှင် (ဖိုင်ဟောင်းရှိနေလျှင်) Update လုပ်ရန် SHA ကို မဖြစ်မနေ ထည့်ပေးရပါမယ်။
        if(sha) {
            bodyData.sha = sha;
        }

        try {
            // PUT request ကို Header ထဲမှာ Cache-Control အပြည့်အဝပါဝင်ပြီး ပို့မယ်
            let uploadRes = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${filepath}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${GH_TOKEN}`,
                    'Content-Type': 'application/json',
                    'Cache-Control': 'no-cache'
                },
                body: JSON.stringify(bodyData)
            });

            if(uploadRes.ok) {
                alert("စာအုပ်အား Database (GitHub) ထဲသို့ အောင်မြင်စွာ တင်ပြီးပါပြီ။ ၁ မိနစ်ခန့်အကြာတွင် မူရင်း Web ပေါ်တွင် မြင်တွေ့ရပါမည်။");
                document.getElementById('bookImage').value = '';
                document.getElementById('bookTitle').value = '';
                document.getElementById('bookDesc').value = '';
            } else {
                let errData = await uploadRes.json();
                alert("အမှားအယွင်းရှိသွားပါသည်: " + errData.message);
            }
        } catch(err) {
            alert("Network Error: ချိတ်ဆက်မှု အဆင်မပြေပါ!");
        } finally {
            saveBtn.innerText = "SAVE (သိမ်းဆည်းမည်)";
            adminBox.classList.remove('loading');
        }
    }
</script>
</body>
</html>
