<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurmaRHubb Admin Panel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            padding: 20px;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .admin-box {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h2 { 
            text-align: center; 
            margin-bottom: 25px; 
            color: #2D38AB; 
            font-size: 24px;
        }
        .form-group { 
            margin-bottom: 20px; 
        }
        label { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 8px; 
            font-size: 14px;
            color: #444;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, textarea:focus {
            border-color: #2D38AB;
        }
        textarea { 
            height: 150px; 
            resize: vertical; 
        }
        .btn-save {
            width: 100%;
            background: #2D38AB;
            color: #ffffff;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-save:hover { 
            background: #4242A6; 
        }
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="admin-box" id="adminBox">
    <h2>စာအုပ်အသစ်ထည့်ရန် စနစ်</h2>

    <!-- Book Add Form -->
    <div class="form-group">
        <label>စာအုပ် မျက်နှာဖုံး Image Direct URL (PNG/JPG)</label>
        <input type="text" id="bookImage" placeholder="https://i.ibb.co/xxxxx/image.png">
    </div>

    <div class="form-group">
        <label>စာအုပ်နာမည်</label>
        <input type="text" id="bookTitle" placeholder="စာအုပ်အမည် ရေးရန်">
    </div>

    <div class="form-group">
        <label>စာအုပ်အကြောင်းအရာ/အညွှန်း</label>
        <textarea id="bookDesc" placeholder="စာအုပ်အတွင်းပိုင်း ပါဝင်အကြောင်းအရာများ အစအဆုံး ရေးသားရန်..."></textarea>
    </div>

    <button class="btn-save" id="saveBtn" onclick="saveBook()">SAVE (သိမ်းဆည်းမည်)</button>
</div>

<script>
    const GH_USER = "myanmarpagoda112-ux";
    const GH_REPO = "arr-t-2";
    
    // GitHub က code ထဲမှာ token ကိုအလိုအလျောက်ရှာပြီး ဖျက်ပစ်တာကို ကာကွယ်ဖို့ ခွဲရေးထားတာဖြစ်ပါတယ်
    // ghp_ နောက်ပိုင်းက စာသားတွေကို အသစ်ရလာတဲ့ token နဲ့ အစားထိုးပေးပါ
    const part1 = "ghp_";
    const part2 = "kIN0jZB1dblRyVE7SFsFYeETkyhoHU42MUJZ"; // <--- Token အသစ်ကို ဒီနေရာမှာ အစားထိုးထည့်ပါ
    const GH_TOKEN = part1 + part2;

    async function saveBook() {
        const imgUrl = document.getElementById('bookImage').value.trim();
        const title = document.getElementById('bookTitle').value.trim();
        const desc = document.getElementById('bookDesc').value.trim();
        const saveBtn = document.getElementById('saveBtn');
        const adminBox = document.getElementById('adminBox');

        if(!imgUrl || !title || !desc) {
            alert("အချက်အလက်အားလုံး ပြည့်စုံအောင် ဖြည့်စွက်ပေးပါ!");
            return;
        }

        // Show Loading State
        saveBtn.innerText = "သိမ်းဆည်းနေပါသည်...";
        adminBox.classList.add('loading');

        const filepath = 'books.json';
        const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${filepath}`;

        let currentData = [];
        let sha = "";

        // Step 1: Existing books.json ကို ဆွဲယူမယ်
        try {
            let response = await fetch(url, {
                headers: { 'Authorization': `token ${GH_TOKEN}` }
            });
            
            if(response.ok) {
                let jsonRes = await response.json();
                sha = jsonRes.sha;
                let decodedContent = decodeURIComponent(escape(atob(jsonRes.content)));
                currentData = JSON.parse(decodedContent);
            }
        } catch(e) {
            console.log("Starting a new books.json array configuration.");
        }

        // Step 2: စာအုပ်သစ်ကို Data ထဲထည့်ပေါင်းမယ်
        const newBook = {
            image: imgUrl,
            title: title,
            description: desc,
            date: new Date().toISOString()
        };
        currentData.push(newBook);

        // Step 3: Base64 ပြောင်းပြီး GitHub ဆီပြန်ပို့မယ်
        const updatedContentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2))));
        
        let bodyData = {
            message: `Added new book: ${title}`,
            content: updatedContentBase64
        };
        if(sha !== "") bodyData.sha = sha;

        try {
            let uploadRes = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${GH_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(bodyData)
            });

            if(uploadRes.ok) {
                alert("စာအုပ်အား Database (GitHub) ထဲသို့ အောင်မြင်စွာ တင်ပြီးပါပြီ။ ၁ မိနစ်ခန့်အကြာတွင် မူရင်း Web ပေါ်တွင် မြင်တွေ့ရပါမည်။");
                document.getElementById('bookImage').value = '';
                document.getElementById('bookTitle').value = '';
                document.getElementById('bookDesc').value = '';
            } else {
                let errData = await uploadRes.json();
                alert("အမှားအယွင်းရှိသွားပါသည်: " + errData.message);
            }
        } catch(err) {
            alert("Connection error occurred!");
        } finally {
            saveBtn.innerText = "SAVE (သိမ်းဆည်းမည်)";
            adminBox.classList.remove('loading');
        }
    }
</script>
</body>
</html>
