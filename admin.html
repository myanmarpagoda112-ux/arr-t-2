<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <style>
        body { background: #1a1c23; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #242630; padding: 20px; border-radius: 8px; width: 100%; max-width: 400px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #1a1c23; border: 1px solid #4242a6; color: #fff; }
        button { width: 100%; padding: 10px; background: #2d38ab; border: none; color: #fff; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card" id="loginBox">
        <h2>Login</h2>
        <input type="password" id="tokenInput" placeholder="Enter GitHub Token (ghp_...)">
        <button onclick="saveToken()">Login</button>
    </div>

    <div class="card" id="uploadBox" style="display:none;">
        <h2>Upload Book</h2>
        <input type="text" id="imgUrl" placeholder="Image URL">
        <input type="text" id="title" placeholder="Title">
        <textarea id="desc" rows="5" placeholder="Description"></textarea>
        <button onclick="upload()">Publish</button>
        <div id="status"></div>
    </div>

    <script>
        let GITHUB_TOKEN = "";
        const USER = "myanmarpagoda112-ux";
        const REPO = "arr-t-2";

        function saveToken() {
            GITHUB_TOKEN = document.getElementById('tokenInput').value;
            if(GITHUB_TOKEN.startsWith("ghp_")) {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('uploadBox').style.display = 'block';
            } else { alert("Invalid Token!"); }
        }

        async function upload() {
            const status = document.getElementById('status');
            const data = {
                image: document.getElementById('imgUrl').value,
                title: document.getElementById('title').value,
                description: document.getElementById('desc').value,
                timestamp: Date.now()
            };

            const url = `https://api.github.com/repos/${USER}/${REPO}/contents/books.json`;
            
            // Get current file
            const res = await fetch(url, { headers: { "Authorization": `token ${GITHUB_TOKEN}` } });
            const file = await res.json();
            
            let books = JSON.parse(atob(file.content));
            books.push(data);

            // Update file
            await fetch(url, {
                method: "PUT",
                headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: "Update books",
                    content: btoa(JSON.stringify(books, null, 2)),
                    sha: file.sha
                })
            });
            status.innerText = "Success!";
        }
    </script>
</body>
</html>
