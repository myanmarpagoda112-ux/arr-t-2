<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurmaRHubb.COM - Login</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#0f3460 50%,#16213e 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}.auth-container{background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:15px;box-shadow:0 20px 60px rgba(0,0,0,0.3);width:100%;max-width:450px;padding:40px}.header{text-align:center;margin-bottom:35px}.logo{font-size:28px;font-weight:900;background:linear-gradient(135deg,#e74c3c 0%,#f39c12 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}.tab-buttons{display:flex;gap:10px;margin-bottom:30px}.tab-btn{flex:1;padding:12px;background:#ecf0f1;border:none;border-radius:8px;font-weight:600;cursor:pointer;transition:all 0.3s ease;text-transform:uppercase;font-size:13px}.tab-btn.active{background:#e74c3c;color:white}.form-group{margin-bottom:20px}label{display:block;font-weight:600;margin-bottom:8px;color:#2c3e50;font-size:13px;text-transform:uppercase;letter-spacing:1px}input[type="text"],input[type="email"],input[type="password"]{width:100%;padding:12px 14px;border:2px solid #ecf0f1;border-radius:8px;font-size:14px;transition:all 0.3s ease;background:#f8f9fa}input:focus{outline:none;border-color:#e74c3c;background:#fff;box-shadow:0 0 0 3px rgba(231,76,60,0.1)}.btn-submit{width:100%;background:linear-gradient(135deg,#e74c3c 0%,#c0392b 100%);color:white;padding:12px;border:none;border-radius:8px;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;transition:all 0.3s ease;box-shadow:0 10px 25px rgba(231,76,60,0.3)}.btn-submit:hover{transform:translateY(-2px);box-shadow:0 15px 35px rgba(231,76,60,0.4)}.form-section{display:none}.form-section.active{display:block}.message{padding:12px 14px;border-radius:8px;margin-bottom:20px;font-size:13px;display:none}.message.success{background:#d5f4e6;color:#27ae60;border-left:4px solid #27ae60;display:block}.message.error{background:#fadbd8;color:#c0392b;border-left:4px solid #c0392b;display:block}.back-link{text-align:center;margin-top:20px}.back-link a{color:#e74c3c;text-decoration:none;font-weight:600;font-size:13px}.back-link a:hover{text-decoration:underline}
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="header"><div class="logo">BurmaRHubb.COM</div></div>
        <div class="tab-buttons"><button class="tab-btn active" onclick="switchTab('login')">🔐 Login</button><button class="tab-btn" onclick="switchTab('signup')">📝 Sign Up</button></div>
        <div class="message" id="message"></div>
        <div class="form-section active" id="loginForm"><form onsubmit="handleLogin(event)"><div class="form-group"><label>Email or Username</label><input type="text" id="loginUsername" required></div><div class="form-group"><label>Password</label><input type="password" id="loginPassword" required></div><button type="submit" class="btn-submit">Login</button></form></div>
        <div class="form-section" id="signupForm"><form onsubmit="handleSignup(event)"><div class="form-group"><label>Username</label><input type="text" id="signupUsername" required></div><div class="form-group"><label>Email</label><input type="email" id="signupEmail" required></div><div class="form-group"><label>Password</label><input type="password" id="signupPassword" required></div><div class="form-group"><label>Confirm Password</label><input type="password" id="signupPasswordConfirm" required></div><button type="submit" class="btn-submit">Create Account</button></form></div>
        <div class="back-link"><a href="/arr-t-2/">← Back to Home</a></div>
    </div>
    <script>function switchTab(tab){document.querySelectorAll('.form-section').forEach(el=>el.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));document.getElementById(tab+'Form').classList.add('active');event.target.classList.add('active')}function handleLogin(e){e.preventDefault();const username=document.getElementById('loginUsername').value;const password=document.getElementById('loginPassword').value;let users=JSON.parse(localStorage.getItem('users')||'[]');let user=users.find(u=>(u.username===username||u.email===username)&&u.password===password);if(user){localStorage.setItem('currentUser',JSON.stringify(user));showMessage('✓ Login successful!','success');setTimeout(()=>window.location.href='/arr-t-2/',1000)}else{showMessage('✗ Invalid credentials','error')}}function handleSignup(e){e.preventDefault();const username=document.getElementById('signupUsername').value;const email=document.getElementById('signupEmail').value;const password=document.getElementById('signupPassword').value;const confirm=document.getElementById('signupPasswordConfirm').value;if(password!==confirm){showMessage('✗ Passwords do not match','error');return}let users=JSON.parse(localStorage.getItem('users')||'[]');if(users.find(u=>u.username===username||u.email===email)){showMessage('✗ Username or email exists','error');return}const newUser={id:Date.now(),username,email,password,createdAt:new Date().toISOString()};users.push(newUser);localStorage.setItem('users',JSON.stringify(users));showMessage('✓ Account created!','success');setTimeout(()=>switchTab('login'),1000)}function showMessage(msg,type){const messageEl=document.getElementById('message');messageEl.innerText=msg;messageEl.className='message '+type;setTimeout(()=>messageEl.className='message',3000)}
    </script>
</body>
</html>
